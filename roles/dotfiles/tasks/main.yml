- name: Check default directories for dotfiles
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - "{{ ansible_user_dir }}/.config"
    - "{{ ansible_user_dir }}/.config/zsh"
    - "{{ ansible_user_dir }}/.dotfiles"

- name: Create symlinks for configuration files
  ansible.builtin.file:
    src: "{{ role_path }}/files/{{ item.src }}"
    dest: "{{ item.dest }}"
    state: link
    force: yes
  loop:
    - { src: 'starship.toml', dest: '{{ ansible_user_dir }}/.config/starship.toml' }
    - { src: 'gitconfig', dest: '{{ ansible_user_dir }}/.gitconfig' }
    - { src: 'zshrc', dest: '{{ ansible_user_dir }}/.zshrc' }
    - { src: 'aliases.zsh', dest: '{{ ansible_user_dir }}/.config/zsh/aliases.zsh' }
    - { src: 'functions.zsh', dest: '{{ ansible_user_dir }}/.config/zsh/functions.zsh' }
    - { src: 'fzf.zsh', dest: '{{ ansible_user_dir }}/.config/zsh/fzf.zsh' }
    - { src: 'git.zsh', dest: '{{ ansible_user_dir }}/.config/zsh/git.zsh' }
    - { src: 'history.zsh', dest: '{{ ansible_user_dir }}/.config/zsh/history.zsh' }
    - { src: '.tmux.conf', dest: '{{ ansible_user_dir }}/.tmux.conf' }