---
- name: Ensure GPG catalog is present in filesystem
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true

- name: Download GPG keys for external repositories
  ansible.builtin.get_url:
    url: "{{ item.key_url }}"
    dest: "{{ item.key_dest }}"
    mode: "0644"
  loop: "{{ custom_apt_repositories }}"
  when: custom_apt_repositories is defined
  become: true

- name: Add external repositories to system
  ansible.builtin.apt_repository:
    repo: "{{ item.repo_line }}"
    state: present
    filename: "{{ item.filename }}"
    update_cache: false
  loop: "{{ custom_apt_repositories }}"
  when: custom_apt_repositories is defined
  become: true
  register: common_added_repos
  notify: Update apt cache

- name: Install core packages
  ansible.builtin.apt:
    name:
      - curl
      - wget
      - git
      - gnupg
      - ca-certificates
      - net-tools
      - iputils-ping
      - iproute2
      - dnsutils
      - openssh-client
      - openssh-server
      - tcpdump
      - nmap
      - traceroute
      - mtr
      - jq
      - gh
      - ripgrep
      - eza
      - htop
      - tmux
      - socat # SSH agent socket forwarding Windows<->WSL
    state: present
    update_cache: true
    cache_valid_time: 3600
  become: true
